id: com.cerebralnomad.recipescribe
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: recipe_scribe-2.0.1.py

finish-args:
  - --filesystem=home:rw
  - --socket=x11
  - --share=ipc

modules:
  # Include Tkinter
  - name: tkinter
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/iwalton3/tkinter-standalone
        commit: 88aa05075d90d393a29a484bce676e237d311082
    modules:
      - name: tcl
        buildsystem: autotools
        subdir: unix
        post-install:
          - chmod 755 /app/lib/libtcl*.so
        cleanup:
          - /bin
          - /lib/pkgconfig
          - /man
        sources:
          - type: archive
            url: https://prdownloads.sourceforge.net/tcl/tcl8.6.15-src.tar.gz
            sha256: 861e159753f2e2fbd6ec1484103715b0be56be3357522b858d3cbb5f893ffef1
            x-checker-data:
              type: anitya
              project-id: 4941
              stable-only: true
              url-template: https://prdownloads.sourceforge.net/tcl/tcl$version-src.tar.gz
      - name: tk
        buildsystem: autotools
        subdir: unix
        post-install:
          - chmod 755 /app/lib/libtk*.so
        cleanup:
          - /bin
          - /lib/pkgconfig
          - /man
        sources:
          - type: archive
            url: https://prdownloads.sourceforge.net/tcl/tk8.6.15-src.tar.gz
            sha256: 550969f35379f952b3020f3ab7b9dd5bfd11c1ef7c9b7c6a75f5c49aca793fec
            x-checker-data:
              type: anitya
              project-id: 11426
              stable-only: true
              url-template: https://prdownloads.sourceforge.net/tcl/tk$version-src.tar.gz


  - name: recipescribe
    buildsystem: simple
    build-commands:
      - install -D recipe_scribe-2.0.1.py /app/bin/recipe_scribe-2.0.1.py
      - install -Dm644 HelpText.py /app/bin/HelpText.py
      - install -Dm644 AboutText.py /app/bin/AboutText.py
      - install -Dm644 ToolTip.py /app/bin/ToolTip.py
      - install -D com.cerebralnomad.recipescribe.metainfo.xml /app/share/metainfo/com.cerebralnomad.recipescribe.metainfo.xml
      - install -D com.cerebralnomad.recipescribe.desktop /app/share/applications/com.cerebralnomad.recipescribe.desktop
      - install -Dm644 rc_128.png /app/share/icons/hicolor/128x128/apps/com.cerebralnomad.recipescribe.png
      - install -Dm644 rc_256.png /app/share/icons/hicolor/256x256/apps/com.cerebralnomad.recipescribe.png
    sources:
      - type: archive
        url: https://github.com/cerebralnomad/Recipe-Scribe/releases/download/v2.0.1-stable/recipe_scribe_2.0.2_flatpak_source_files.tar.gz
        sha256: 89c50df7709bce87b93cf4fdcc8cd75d74b0ecc9de4d4f4351cb7171fa2cf4d1

